name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # 1. Android / Termux Build (The fix for your phone)
          - os: ubuntu-latest
            target: aarch64-linux-android
            name: oxidroid-android-aarch64
            use_cross: true
          # 2. Universal Linux Build (Static binary for any desktop Linux)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            name: oxidroid-linux-x86_64
            use_cross: true
          # 3. Windows Build
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: oxidroid-windows.exe
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build Release
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Prepare Binary for Upload
        run: |
          # Create a staging directory to cleanly rename files before upload
          mkdir -p staging
          if [ -f "target/${{ matrix.target }}/release/oxidroid.exe" ]; then
            cp target/${{ matrix.target }}/release/oxidroid.exe staging/${{ matrix.name }}
          else
            cp target/${{ matrix.target }}/release/oxidroid staging/${{ matrix.name }}
          fi
        shell: bash

      - name: Upload Artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: staging/*
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}