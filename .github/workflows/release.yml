name: Release
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Build Release
        run: cargo build --release
      - name: Upload Artifacts
        uses: softprops/action-gh-release@v1
        with:
          files: |
            target/release/oxidroid
            target/release/oxidroid.exe