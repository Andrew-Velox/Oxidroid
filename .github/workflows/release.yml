name: Release
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: oxidroid-linux-x86
            use_cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: oxidroid-windows.exe
            use_cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu # Target for Termux
            name: oxidroid-android-aarch64
            use_cross: true # Requires the 'cross' tool

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build Release
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Upload Artifacts
        uses: softprops/action-gh-release@v2
        with:
          # This tells GitHub to pick up the build and rename it based on your matrix
          files: |
            target/${{ matrix.target }}/release/oxidroid -> ${{ matrix.name }}
            target/${{ matrix.target }}/release/oxidroid.exe -> ${{ matrix.name }}
          fail_on_unmatched_files: false